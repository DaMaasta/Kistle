# Nginx-Konfiguration für Kistle
# Ablegen unter: /etc/nginx/sites-available/kistle
# Aktivieren mit: sudo ln -s /etc/nginx/sites-available/kistle /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name deine-domain.de;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name deine-domain.de;

    # SSL via Cloudflare — Cloudflare terminiert TLS, Origin-Zertifikat verwenden
    # ssl_certificate     /etc/nginx/certs/origin.pem;
    # ssl_certificate_key /etc/nginx/certs/origin-key.pem;

    # React App (statische Dateien)
    root /var/www/kistle;
    index index.html;

    # SPA — alle Routen zur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Node.js API
    location /api/ {
        proxy_pass         http://webapp:3000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}
